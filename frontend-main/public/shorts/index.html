<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>Shorts Feed</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="header">
      <div class="header-left">
        <svg
          class="header-logo"
          viewBox="0 0 90 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="Shorts"
        >
          <path
            d="M14.4 7.2A7.2 7.2 0 0 0 0 7.2v5.6A7.2 7.2 0 0 0 14.4 12.8V7.2z"
            fill="#ff0000"
          />
          <path d="M5.8 6.4l5.8 3.6-5.8 3.6V6.4z" fill="#fff" />
        </svg>
        <span class="header-title">Shorts</span>
      </div>
      <div class="header-right">
        <button
          id="mute-btn"
          class="icon-btn"
          title="Toggle sound"
          aria-label="Unmute"
        >
          <svg id="mute-icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3.63 3.63a.996.996 0 0 0 0 1.41L7.29 8.7 7 9H4c-.55 0-1 .45-1 1v4c0 .55.45 1 1 1h3l3.29 3.29c.63.63 1.71.18 1.71-.71v-4.17l4.18 4.18c-.49.37-1.02.68-1.6.91-.36.15-.58.53-.58.92 0 .72.73 1.18 1.39.91.8-.33 1.55-.77 2.22-1.31l1.34 1.34a.996.996 0 1 0 1.41-1.41L5.05 3.63c-.39-.39-1.02-.39-1.42 0zM19 12c0 .82-.15 1.61-.41 2.34l1.53 1.53c.56-1.17.88-2.48.88-3.87 0-3.83-2.4-7.11-5.78-8.4-.59-.23-1.22.23-1.22.86v.19c0 .38.25.71.61.85C17.18 6.54 19 9.06 19 12zm-8.71-6.29-.17.17L12 7.76V6.41c0-.89-1.08-1.33-1.71-.7zM16.5 12A4.5 4.5 0 0 0 14 7.97v1.79l2.48 2.48c.01-.08.02-.16.02-.24z"
            />
          </svg>
          <svg
            id="unmute-icon"
            viewBox="0 0 24 24"
            fill="currentColor"
            style="display: none"
          >
            <path
              d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
            />
          </svg>
        </button>
      </div>
    </header>

    <div id="feed"></div>

    <!-- Location picker -->
    <div id="location-picker">
      <div class="lp-inner">
        <svg class="lp-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        <h1 class="lp-heading">Where do you want to go?</h1>
        <p class="lp-sub">Get travel Shorts for any destination</p>
        <form id="location-form" class="lp-form">
          <input
            id="location-input"
            class="lp-input"
            type="text"
            placeholder="Paris, Bali, Japan…"
            autocomplete="off"
            spellcheck="false"
            maxlength="60"
            required
          />
          <button type="submit" class="lp-submit" aria-label="Go">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
            </svg>
          </button>
        </form>
        <div class="lp-chips">
          <button class="lp-chip" data-loc="Tokyo">Tokyo</button>
          <button class="lp-chip" data-loc="Paris">Paris</button>
          <button class="lp-chip" data-loc="Bali">Bali</button>
          <button class="lp-chip" data-loc="New York">New York</button>
          <button class="lp-chip" data-loc="Iceland">Iceland</button>
          <button class="lp-chip" data-loc="Thailand">Thailand</button>
          <button class="lp-chip" data-loc="Italy">Italy</button>
          <button class="lp-chip" data-loc="Maldives">Maldives</button>
        </div>
      </div>
    </div>

    <!-- Initial loading screen -->
    <div id="initial-loading" style="display:none">
      <div class="spinner"></div>
      <p>Loading Shorts…</p>
    </div>

    <!-- Error screen -->
    <div id="error-screen" style="display: none">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        width="48"
        height="48"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      <p>Couldn't load shorts</p>
      <button id="retry-btn">Try Again</button>
    </div>

    <!-- Desktop nav hint (fades after first scroll) -->
    <div id="nav-hint" class="nav-hint" aria-hidden="true">
      <span>↑ ↓</span>
      <span>or scroll</span>
    </div>

    <script src="app.js"></script>
  </body>
</html>
