<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SwipeAndFly · Material You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,GRAD@8..144,200..900,-50..150&family=Google+Sans+Text:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Google Sans Text', 'Roboto Flex', system-ui, sans-serif;
    background: var(--m3-surface-dim, #d8dee9);
    color: var(--m3-on-surface, #1a1c1e);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { width: 100%; height: 100%; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  .symbol { font-family: 'Material Symbols Rounded'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; font-feature-settings: 'liga'; -webkit-font-feature-settings: 'liga'; -moz-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; user-select: none; overflow: hidden; max-width: 1.2em; max-height: 1.2em; }
  .symbol:not(.loaded-symbol) { color: transparent; }
  .symbols-loaded .symbol { color: inherit; }
  .display-font { font-family: 'Roboto Flex', 'Google Sans Text', system-ui, sans-serif; font-variation-settings: 'opsz' 144, 'GRAD' 0; }
  .mono { font-family: 'Roboto Mono', monospace; }
  button { font-family: inherit; }
</style>
</head>
<body>
<script>
  // Wait for Material Symbols font to load before showing icons
  if (document.fonts) {
    document.fonts.ready.then(() => {
      document.body.classList.add('symbols-loaded');
    });
    // Fallback after 3s
    setTimeout(() => document.body.classList.add('symbols-loaded'), 3000);
  } else {
    document.addEventListener('DOMContentLoaded', () => document.body.classList.add('symbols-loaded'));
  }
</script>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/m3-theme.jsx"></script>
<script type="text/babel" src="src/m3-components.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/screens.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
